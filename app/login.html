<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anmelden – ReviewGuards</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, Helvetica, sans-serif; background: #f5f6ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .wrap { width: 100%; max-width: 440px; padding: 24px; }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo-text { font-size: 1.6rem; font-weight: 900; color: #111; letter-spacing: -0.02em; }
    .logo-text span { color: #3551FF; }
    .logo-sub { font-size: 0.82rem; color: #6b7280; margin-top: 4px; }
    .card { background: #fff; border-radius: 16px; padding: 40px; box-shadow: 0 4px 32px rgba(53,81,255,0.1); }
    .tabs { display: flex; border-bottom: 2px solid #e5e7eb; margin-bottom: 28px; }
    .tab { flex: 1; padding: 12px; text-align: center; font-weight: 600; font-size: 0.9rem; color: #9ca3af; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
    .tab.active { color: #3551FF; border-bottom-color: #3551FF; }
    .panel { display: none; }
    .panel.active { display: block; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 0.82rem; font-weight: 700; color: #374151; margin-bottom: 6px; }
    input { width: 100%; padding: 11px 14px; border: 1.5px solid #e5e7eb; border-radius: 10px; font-size: 0.92rem; color: #111; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: #3551FF; }
    .btn { width: 100%; padding: 13px; background: #3551FF; color: #fff; border: none; border-radius: 10px; font-size: 0.95rem; font-weight: 700; cursor: pointer; margin-top: 6px; transition: filter 0.2s; }
    .btn:hover { filter: brightness(1.1); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; filter: none; }
    .msg { padding: 11px 14px; border-radius: 8px; font-size: 0.83rem; margin-bottom: 14px; display: none; }
    .msg.error { background: #fee2e2; border: 1px solid #fca5a5; color: #dc2626; }
    .msg.success { background: #dcfce7; border: 1px solid #86efac; color: #16a34a; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-text">Review<span>Guards</span></div>
    <div class="logo-sub">Kundenkonto</div>
  </div>
  <div class="card">
    <div class="tabs">
      <div class="tab active" data-tab="login">Anmelden</div>
      <div class="tab" data-tab="register">Registrieren</div>
    </div>
    <div id="msg" class="msg"></div>
    <div class="panel active" id="panel-login">
      <div class="form-group"><label>E-Mail</label><input type="email" id="l-email" placeholder="deine@email.de" autocomplete="email"></div>
      <div class="form-group"><label>Passwort</label><input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password"></div>
      <button class="btn" id="login-btn">Anmelden</button>
    </div>
    <div class="panel" id="panel-register">
      <div class="form-group"><label>Firmenname</label><input type="text" id="r-company" placeholder="Muster GmbH"></div>
      <div class="form-group"><label>E-Mail</label><input type="email" id="r-email" placeholder="deine@email.de"></div>
      <div class="form-group"><label>Passwort (min. 8 Zeichen)</label><input type="password" id="r-pass" placeholder="••••••••"></div>
      <button class="btn" id="reg-btn">Konto erstellen</button>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
  const { createClient } = window.supabase;
  const sb = createClient('https://lgrnmiszhhahfcmctmwo.supabase.co', 'sb_publishable_E5tO2TvBrU8f1s5djnVOOQ_vk1djyAI');

  sb.auth.getSession().then(({ data: { session } }) => { if (session) location.href = 'dashboard.html'; });

  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('panel-' + t.dataset.tab).classList.add('active');
    hideMsg();
  }));

  function showMsg(text, type) { const el = document.getElementById('msg'); el.textContent = text; el.className = 'msg ' + type; el.style.display = 'block'; }
  function hideMsg() { document.getElementById('msg').style.display = 'none'; }

  document.getElementById('login-btn').addEventListener('click', async () => {
    const email = document.getElementById('l-email').value.trim();
    const pass  = document.getElementById('l-pass').value;
    if (!email || !pass) { showMsg('Bitte alle Felder ausfüllen', 'error'); return; }
    const btn = document.getElementById('login-btn');
    btn.disabled = true; btn.textContent = 'Anmelden…';
    const { data: signInData, error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) { showMsg('Fehler: ' + error.message, 'error'); btn.disabled = false; btn.textContent = 'Anmelden'; return; }
    // Check onboarding
    const { data: profile } = await sb.from('profiles').select('onboarding_complete').eq('user_id', signInData.user.id).single();
    location.href = (!profile || !profile.onboarding_complete) ? 'onboarding.html' : 'dashboard.html';
  });

  document.getElementById('reg-btn').addEventListener('click', async () => {
    const company = document.getElementById('r-company').value.trim();
    const email   = document.getElementById('r-email').value.trim();
    const pass    = document.getElementById('r-pass').value;
    if (!company || !email || !pass) { showMsg('Bitte alle Felder ausfüllen', 'error'); return; }
    if (pass.length < 8) { showMsg('Passwort muss mind. 8 Zeichen lang sein', 'error'); return; }
    const btn = document.getElementById('reg-btn');
    btn.disabled = true; btn.textContent = 'Erstelle Konto…';
    const { data, error } = await sb.auth.signUp({ email, password: pass, options: { data: { company_name: company } } });
    if (error) { showMsg('Fehler: ' + error.message, 'error'); btn.disabled = false; btn.textContent = 'Konto erstellen'; return; }
    if (data.user) {
      await sb.from('profiles').upsert({ user_id: data.user.id, company_name: company });
      const { data: { session: s } } = await sb.auth.getSession();
      if (s) { location.href = 'onboarding.html'; return; }
    }
    showMsg('Konto erstellt! Bitte E-Mail bestätigen, dann anmelden.', 'success');
    btn.disabled = false; btn.textContent = 'Konto erstellen';
  });

  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const active = document.querySelector('.tab.active').dataset.tab;
    document.getElementById(active === 'login' ? 'login-btn' : 'reg-btn').click();
  });
</script>
</body>
</html>
