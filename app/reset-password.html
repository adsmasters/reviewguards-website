<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passwort zurücksetzen – ReviewGuards</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, Helvetica, sans-serif; background: #f5f6ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .wrap { width: 100%; max-width: 440px; padding: 24px; }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo-text { font-size: 1.6rem; font-weight: 900; color: #111; letter-spacing: -0.02em; }
    .logo-text span { color: #3551FF; }
    .logo-sub { font-size: 0.82rem; color: #6b7280; margin-top: 4px; }
    .card { background: #fff; border-radius: 16px; padding: 40px; box-shadow: 0 4px 32px rgba(53,81,255,0.1); }
    .card-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 6px; }
    .card-sub { font-size: 0.82rem; color: #6b7280; margin-bottom: 24px; line-height: 1.5; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 0.82rem; font-weight: 700; color: #374151; margin-bottom: 6px; }
    input { width: 100%; padding: 11px 14px; border: 1.5px solid #e5e7eb; border-radius: 10px; font-size: 0.92rem; color: #111; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: #3551FF; }
    .btn { width: 100%; padding: 13px; background: #3551FF; color: #fff; border: none; border-radius: 10px; font-size: 0.95rem; font-weight: 700; cursor: pointer; margin-top: 6px; transition: filter 0.2s; }
    .btn:hover { filter: brightness(1.1); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; filter: none; }
    .msg { padding: 11px 14px; border-radius: 8px; font-size: 0.83rem; margin-bottom: 14px; display: none; }
    .msg.error { background: #fee2e2; border: 1px solid #fca5a5; color: #dc2626; }
    .msg.success { background: #dcfce7; border: 1px solid #86efac; color: #16a34a; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-text">Review<span>Guards</span></div>
    <div class="logo-sub">Passwort zurücksetzen</div>
  </div>
  <div class="card">
    <div class="card-title">Neues Passwort setzen</div>
    <div class="card-sub">Gib dein neues Passwort ein. Es muss mindestens 8 Zeichen lang sein.</div>
    <div id="msg" class="msg"></div>
    <div class="form-group">
      <label>Neues Passwort</label>
      <input type="password" id="new-pass" placeholder="••••••••" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label>Passwort bestätigen</label>
      <input type="password" id="confirm-pass" placeholder="••••••••" autocomplete="new-password">
    </div>
    <button class="btn" id="save-btn">Passwort speichern</button>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
  const { createClient } = window.supabase;
  const sb = createClient('https://lgrnmiszhhahfcmctmwo.supabase.co', 'sb_publishable_E5tO2TvBrU8f1s5djnVOOQ_vk1djyAI');

  function showMsg(text, type) { const el = document.getElementById('msg'); el.textContent = text; el.className = 'msg ' + type; el.style.display = 'block'; }

  document.getElementById('save-btn').addEventListener('click', async () => {
    const pass = document.getElementById('new-pass').value;
    const confirm = document.getElementById('confirm-pass').value;

    if (!pass || !confirm) { showMsg('Bitte beide Felder ausfüllen', 'error'); return; }
    if (pass.length < 8) { showMsg('Passwort muss mindestens 8 Zeichen lang sein', 'error'); return; }
    if (pass !== confirm) { showMsg('Passwörter stimmen nicht überein', 'error'); return; }

    const btn = document.getElementById('save-btn');
    btn.disabled = true; btn.textContent = 'Wird gespeichert…';

    const { error } = await sb.auth.updateUser({ password: pass });
    if (error) {
      showMsg('Fehler: ' + error.message, 'error');
      btn.disabled = false; btn.textContent = 'Passwort speichern';
    } else {
      showMsg('Passwort wurde erfolgreich geändert! Du wirst weitergeleitet…', 'success');
      setTimeout(() => { location.href = 'dashboard.html'; }, 2000);
    }
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('save-btn').click();
  });
</script>
</body>
</html>
